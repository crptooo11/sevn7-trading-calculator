<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SEVN7 Trading Calculator Pro</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,Arial,sans-serif;
}

body{
    background:#0f1115;
    color:#fff;
    min-height:100vh;
    padding:20px;
}

.container{
    max-width:1400px;
    margin:auto;
}

.logo{
    color:#00c076;
    font-size:14px;
    letter-spacing:4px;
    margin-bottom:15px;
    font-weight:700;
}

h1{
    font-size:56px;
    margin-bottom:35px;
}

.input-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
}

.input-box label{
    display:block;
    margin-bottom:8px;
    color:#8f98a3;
    font-weight:600;
}

.input-box input{
    width:100%;
    background:#1a1d24;
    border:1px solid #2c313c;
    color:white;
    padding:18px;
    border-radius:10px;
    font-size:26px;
    font-weight:700;
}

.leverage-buttons{
    display:flex;
    gap:12px;
    margin:25px 0 35px;
    flex-wrap:wrap;
}

.leverage-buttons button{
    background:#1a1d24;
    color:white;
    border:1px solid #2c313c;
    width:90px;
    height:50px;
    border-radius:8px;
    cursor:pointer;
    font-size:20px;
}

.leverage-buttons button.active{
    background:#00c076;
    color:#000;
    border:none;
}

.results{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
}

.card{
    background:#15181f;
    border:1px solid #262b35;
    border-radius:12px;
    padding:25px;
}

.card h3{
    color:#9aa3af;
    margin-bottom:30px;
}

.value{
    font-size:48px;
    font-weight:800;
}

.position{
    background:#f5f5f5;
    color:black;
}

.profit{
    color:#00e676;
}

.loss{
    color:#ff4d61;
}

.footer-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
    margin-top:40px;
}

.info-card{
    background:#15181f;
    border:1px solid #262b35;
    border-radius:12px;
    padding:25px;
    text-align:center;
}

.info-card h4{
    margin-bottom:15px;
}

.info-card p{
    color:#9aa3af;
    line-height:1.6;
}

@media(max-width:900px){

    h1{
        font-size:42px;
    }

    .input-grid{
        grid-template-columns:1fr;
    }

    .results{
        grid-template-columns:1fr;
    }

    .footer-grid{
        grid-template-columns:1fr;
    }

    .value{
        font-size:38px;
    }

}
</style>
</head>
<body>

<div class="container">

<div class="logo">SEVN7 PRO</div>

<h1>Trading Calculator</h1>

<div class="input-grid">

<div class="input-box">
<label>Margin (USDT)</label>
<input id="margin" type="number" value="10">
</div>

<div class="input-box">
<label>Leverage</label>
<input id="leverage" type="number" value="50">
</div>

<div class="input-box">
<label>Take Profit (%)</label>
<input id="tp" type="number" value="8">
</div>

<div class="input-box">
<label>Stop Loss (%)</label>
<input id="sl" type="number" value="2">
</div>

</div>

<div class="leverage-buttons">
<button onclick="setLev(25)">25x</button>
<button class="active" onclick="setLev(50)">50x</button>
<button onclick="setLev(100)">100x</button>
<button onclick="setLev(250)">250x</button>
<button onclick="setLev(500)">500x</button>
</div>

<div class="results">

<div class="card position">
<h3>Position Size</h3>
<div class="value" id="position">$500.00</div>
</div>

<div class="card">
<h3>Profit if TP Hits</h3>
<div class="value profit" id="profit">$40.00</div>
</div>

<div class="card">
<h3>Loss if SL Hits</h3>
<div class="value loss" id="loss">$10.00</div>
</div>

<div class="card">
<h3>Risk / Reward</h3>
<div class="value" id="rr">4 : 1</div>
</div>

</div>

<div class="footer-grid">

<div class="info-card">
<h4>Position</h4>
<p>Margin × Leverage</p>
</div>

<div class="info-card">
<h4>Risk</h4>
<p>Know exactly how much is at risk.</p>
</div>

<div class="info-card">
<h4>Reward</h4>
<p>Calculate potential gains instantly.</p>
</div>

<div class="info-card">
<h4>Discipline</h4>
<p>Trade based on numbers, not emotions.</p>
</div>

</div>

</div>

<script>

function calculate(){

const margin =
parseFloat(document.getElementById("margin").value)||0;

const leverage =
parseFloat(document.getElementById("leverage").value)||0;

const tp =
parseFloat(document.getElementById("tp").value)||0;

const sl =
parseFloat(document.getElementById("sl").value)||0;

const position = margin * leverage;
const profit = position * (tp/100);
const loss = position * (sl/100);

document.getElementById("position").innerHTML =
"$"+position.toFixed(2);

document.getElementById("profit").innerHTML =
"$"+profit.toFixed(2);

document.getElementById("loss").innerHTML =
"$"+loss.toFixed(2);

document.getElementById("rr").innerHTML =
loss > 0 ? (profit/loss).toFixed(2)+" : 1" : "0";
}

function setLev(v){

document.getElementById("leverage").value=v;

document.querySelectorAll(".leverage-buttons button")
.forEach(btn=>btn.classList.remove("active"));

event.target.classList.add("active");

calculate();
}

document.querySelectorAll("input").forEach(input=>{
input.addEventListener("input",calculate);
});

calculate();

</script>

</body>
</html>
